# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
tone_instructions: chill
early_access: true
enable_free_tier: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_title_placeholder: "@coderabbitai"
  poem: false
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: true
  changed_files_summary: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
      - "[skip ci]"
    drafts: false
    base_branches:
      - main
      - develop
      - "feature/*"
      - "feat/*"
      - "fix/*"
      - "hotfix/*"

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: false

  tools:
    oxc:
      enabled: true
    biome:
      enabled: true
    gitleaks:
      enabled: true

  path_filters:
    - "!**/*.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/.next/**"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.git/**"
    - "!**/coverage/**"
    - "!**/supabase/migrations/**"

  path_instructions:
    - path: "**/*.ts"
      instructions: |
        Focus on:
        - Type safety and strict mode compliance
        - Proper async/await error handling
        - TypeScript best practices
        - Biome v2 linting compliance

    - path: "src/app/**/*.tsx"
      instructions: |
        Focus on:
        - Next.js 16 App Router best practices
        - Server vs Client Components usage
        - Performance and accessibility
        - Tailwind v4 utility usage (CSS-first config, no tailwind.config)

    - path: "src/app/api/**"
      instructions: |
        Prioritize:
        - Input validation with Zod
        - Authentication checks via Supabase Auth
        - Error handling and status codes
        - Security vulnerabilities

    - path: "src/app/proxy.ts"
      instructions: |
        Review:
        - Next.js 16 proxy configuration
        - Supabase and external service proxying
        - Security of proxied endpoints

    - path: "src/server/trpc/**"
      instructions: |
        Review:
        - tRPC v11 router and procedure patterns
        - Input/output validation with Zod schemas
        - Supabase client usage and RLS compliance
        - Proper use of publicProcedure vs protectedProcedure

    - path: "supabase/**"
      instructions: |
        Review:
        - Migration safety and backward compatibility
        - Row Level Security (RLS) policies
        - Index optimization
        - SECURITY DEFINER function usage

    - path: "**/*.test.ts"
      instructions: |
        Focus on:
        - Test coverage completeness
        - Test isolation and reliability
        - Clear test descriptions

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
